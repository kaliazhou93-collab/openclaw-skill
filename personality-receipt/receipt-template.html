<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Personality Receipt</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 0;
    margin: 0;
    font-family: 'Courier New', Courier, monospace;
  }

  .receipt-outer { width: 320px; }

  .receipt {
    background: #fafaf7;
    width: 100%;
    padding: 28px 24px 4px;
    color: #111;
    box-shadow: none;
  }

  /* 蜘蛛网 SVG logo */
  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
  }

  .brand-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 5px;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .brand-sub {
    font-size: 9px;
    text-align: center;
    color: #666;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  hr { border: none; border-top: 1px solid #222; margin: 8px 0; }
  hr.thin { border-top: 1px dashed #aaa; }

  .row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    line-height: 2;
  }

  .section-title {
    font-size: 9px;
    letter-spacing: 2px;
    color: #888;
    margin: 4px 0 2px;
    text-transform: uppercase;
  }

  .signal-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    line-height: 2;
  }

  .total-section {
    background: #111;
    color: #fafaf7;
    margin: 10px -24px;
    padding: 9px 24px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .closing {
    text-align: center;
    font-size: 10px;
    line-height: 1.8;
    color: #333;
    margin: 12px 0 8px;
    font-style: italic;
    letter-spacing: 1px;
  }

  /* 条形码 */
  .barcode-wrap { text-align: center; margin: 10px 0 0; }

  .barcode-lines {
    display: flex;
    justify-content: center;
    align-items: stretch;
    height: 38px;
  }

  .barcode-num {
    font-size: 8px;
    letter-spacing: 2px;
    color: #555;
    margin-top: 5px;
    margin-bottom: 16px;
  }

  /* 底部锯齿 */
  .tear {
    width: 100%;
    height: 14px;
    background: #fafaf7;
    clip-path: polygon(
      0% 0%, 2% 100%, 4% 0%, 6% 100%, 8% 0%, 10% 100%,
      12% 0%, 14% 100%, 16% 0%, 18% 100%, 20% 0%, 22% 100%,
      24% 0%, 26% 100%, 28% 0%, 30% 100%, 32% 0%, 34% 100%,
      36% 0%, 38% 100%, 40% 0%, 42% 100%, 44% 0%, 46% 100%,
      48% 0%, 50% 100%, 52% 0%, 54% 100%, 56% 0%, 58% 100%,
      60% 0%, 62% 100%, 64% 0%, 66% 100%, 68% 0%, 70% 100%,
      72% 0%, 74% 100%, 76% 0%, 78% 100%, 80% 0%, 82% 100%,
      84% 0%, 86% 100%, 88% 0%, 90% 100%, 92% 0%, 94% 100%,
      96% 0%, 98% 100%, 100% 0%
    );
    box-shadow: 3px 3px 14px rgba(0,0,0,0.2);
  }

  /* 用户头像上传区域 */
  .avatar-note {
    font-size: 8px;
    text-align: center;
    color: #aaa;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
</style>
